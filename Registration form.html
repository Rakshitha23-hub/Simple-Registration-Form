<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#d9d7f7;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:400px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#4b3cbf;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:12px;
        }

        input,
        select{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        .gender{
            display:flex;
            gap:15px;
            margin-top:10px;
        }

        .gender label{
            font-weight:normal;
            display:flex;
            align-items:center;
            gap:5px;
        }

        .agree{
            display:flex;
            align-items:center;
            margin-top:15px;
            gap:8px;
        }

        .agree input{
            width:auto;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#6a0dad;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#4b0082;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Registration Form</h1>

    <form>

        <label for="fname">First Name</label>
        <input
            type="text"
            id="fname"
            name="firstName"
            placeholder="Enter your first name"
            required>

        <label for="lname">Last Name</label>
        <input
            type="text"
            id="lname"
            name="lastName"
            placeholder="Enter your last name"
            required>

        <label>Gender</label>

        <div class="gender">

            <label>
                <input type="radio" name="gender" value="Male">
                Male
            </label>

            <label>
                <input type="radio" name="gender" value="Female">
                Female
            </label>

            <label>
                <input type="radio" name="gender" value="Other">
                Other
            </label>

        </div>

        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required>

        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required>

        <label for="birthday">Birthday</label>
        <input
            type="date"
            id="birthday"
            name="birthday"
            required>

        <div class="agree">
            <input type="checkbox" id="agree" required>
            <label for="agree">I agree to the terms and conditions.</label>
        </div>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
